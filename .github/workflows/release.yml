name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Which semantic version part to bump"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Bump version
        id: bump
        run: |
          version=$(python scripts/bump_version.py pyproject.toml "${{ inputs.release_type }}")
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "Release v${{ steps.bump.outputs.version }}"
      - name: Create tag
        run: git tag -a "v${{ steps.bump.outputs.version }}" -m "Release v${{ steps.bump.outputs.version }}"
      - name: Push release commit and tag
        run: git push origin main --follow-tags
